naftiko: 1.0.0-alpha2
info:
  label: Justworks Webhooks API — Webhooks
  description: 'Justworks Webhooks API. 3 operations. Lead operation: Justworks List Webhooks. List, resume, and simulate Justworks event webhooks.'
  tags:
  - Justworks
  - Webhooks
  - Events
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    JUSTWORKS_ACCESS_TOKEN: JUSTWORKS_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: webhooks
    baseUri: https://public-api.justworks.com
    description: Justworks Webhooks API business capability.
    resources:
    - name: v1-webhooks-get
      path: /v1/webhooks/get
      operations:
      - name: listwebhooks
        method: POST
        description: Justworks List Webhooks
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-webhooks-webhook_id-resume
      path: /v1/webhooks/{webhook_id}/resume
      operations:
      - name: resumewebhook
        method: POST
        description: Justworks Resume Webhook
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-webhooks-webhook_id-simulate
      path: /v1/webhooks/{webhook_id}/simulate
      operations:
      - name: simulatewebhook
        method: POST
        description: Justworks Simulate Webhook
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      key: Authorization
      value: 'Bearer {{env.JUSTWORKS_ACCESS_TOKEN}}'
      placement: header
  exposes:
  - type: mcp
    namespace: webhooks-mcp
    port: 9090
    transport: http
    description: MCP adapter for Justworks Webhooks API.
    tools:
    - name: justworks-list-webhooks
      description: Justworks List Webhooks
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: webhooks.listwebhooks
      outputParameters:
      - type: object
        mapping: $.
    - name: justworks-resume-webhook
      description: Justworks Resume Webhook
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: webhooks.resumewebhook
      outputParameters:
      - type: object
        mapping: $.
    - name: justworks-simulate-webhook
      description: Justworks Simulate Webhook
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: webhooks.simulatewebhook
      outputParameters:
      - type: object
        mapping: $.
